stage: p1_text_warmup
track: s0-core
text_only: true
visual_mode: fast
data_bundle_ids:
  - tokenizer_v1
  - p1_text_warmup_v1
objective:
  markdown_language_prior: true
  latex_language_prior: true
  canonical_output_only: true
optimizer:
  name: adamw
  lr: 0.0006
  betas: [0.9, 0.95]
  weight_decay: 0.05
  eps: 1.0e-8
  grad_clip_norm: 1.0
scheduler:
  name: cosine
  warmup_ratio: 0.04
  min_lr_ratio: 0.2
data_mix:
  exact_pairs: 0.85
  synthetic_exact: 0.0
  structural_aux: 0.0
  table_aux: 0.05
  formula_aux: 0.10
  long_tail_aux: 0.0
  weak_label_discount: 0.0
curriculum:
  clean_phase_steps: 2000
  transition_phase_steps: 6000
  hard_phase_steps: 0
  hard_example_boost: 1.0
  pathological_boost: 1.0
  refresh_failure_pool_every: 0
  keep_easy_fraction: 1.0
module_lr:
  visual_tokenizer: 0.0
  layout_side_encoder: 0.0
  latent_bottleneck: 0.8
  planner: 1.0
  writer: 1.25
  auxiliary_heads: 0.5
objective_weights:
  token_ce: 1.0
  mtp_ce: 0.2
  formula_ce: 0.2
  table_ce: 0.1
  block_type: 0.0
  block_length: 0.0
  specialist_hint: 0.0
  block_box: 0.0
  planner_confidence: 0.0
  rotation: 0.0
  handwriting: 0.0
  formula_tokens: 0.0
  table_blocks: 0.0
  table_spans: 0.0
  label_smoothing: 0.02
  sample_weight_floor: 0.25
