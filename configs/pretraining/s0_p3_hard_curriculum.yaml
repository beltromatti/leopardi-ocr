stage: p3_hard_curriculum
track: s0-core
text_only: false
visual_mode: hard
data_bundle_ids:
  - p2_exact_core_v1
  - p2_structural_aux_v1
  - p3_hardcases_v1
objective:
  synthetic_hardening: true
  arbitrary_rotation: true
  handwriting_and_photo_robustness: true
optimizer:
  name: adamw
  lr: 0.0002
  betas: [0.9, 0.95]
  weight_decay: 0.1
  eps: 1.0e-8
  grad_clip_norm: 1.0
scheduler:
  name: cosine
  warmup_ratio: 0.02
  min_lr_ratio: 0.2
data_mix:
  exact_pairs: 0.32
  synthetic_exact: 0.30
  structural_aux: 0.08
  table_aux: 0.11
  formula_aux: 0.11
  long_tail_aux: 0.08
  weak_label_discount: 0.30
curriculum:
  clean_phase_steps: 1000
  transition_phase_steps: 4000
  hard_phase_steps: 30000
  hard_example_boost: 1.35
  pathological_boost: 1.65
  refresh_failure_pool_every: 500
  keep_easy_fraction: 0.12
module_lr:
  visual_tokenizer: 0.6
  layout_side_encoder: 0.75
  latent_bottleneck: 0.9
  planner: 1.2
  writer: 1.3
  auxiliary_heads: 1.15
objective_weights:
  token_ce: 1.0
  mtp_ce: 0.15
  formula_ce: 0.2
  table_ce: 0.2
  block_type: 0.25
  block_length: 0.1
  specialist_hint: 0.15
  block_box: 0.1
  planner_confidence: 0.08
  rotation: 0.1
  handwriting: 0.1
  formula_tokens: 0.15
  table_blocks: 0.15
  table_spans: 0.1
  label_smoothing: 0.01
  sample_weight_floor: 0.25
