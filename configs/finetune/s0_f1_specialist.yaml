stage: f1_specialist_sft
track: s0-core
visual_mode: hard
text_only: false
adapter:
  mode: full
  rank: 0
  alpha: 0
  dropout: 0.0
  target_modules:
    - writer
    - planner
focus:
  - merged_cell_tables
  - dense_formula_pages
  - handwriting
  - rotation
  - charts
optimizer:
  name: adamw
  lr: 0.00008
  betas: [0.9, 0.95]
  weight_decay: 0.05
  eps: 1.0e-8
  grad_clip_norm: 1.0
scheduler:
  name: cosine
  warmup_ratio: 0.04
  min_lr_ratio: 0.18
sampling:
  easy_ratio: 0.12
  medium_ratio: 0.22
  hard_ratio: 0.42
  pathological_ratio: 0.24
  failure_replay_ratio: 0.25
  refresh_failure_buffer_every: 250
  keep_clean_anchor_fraction: 0.12
module_lr:
  visual_tokenizer: 0.55
  latent_bottleneck: 0.85
  planner: 1.15
  writer: 1.25
  auxiliary_heads: 1.05
verifier:
  reward_clip: 2.2
  normalize_rewards: true
  min_reward_group_size: 6
  informative_reward_floor: 0.015
  target_latency_ms: 1350.0
  target_output_tokens: 5120
  kl_anchor_beta: 0.0
loss_weights:
  token_ce: 1.0
  formula_ce: 0.18
  table_ce: 0.18
  repair_ce: 0.15
  block_type: 0.2
  block_length: 0.05
  specialist_hint: 0.12
  block_box: 0.08
  rotation: 0.08
  handwriting: 0.08
  formula_tokens: 0.15
  table_blocks: 0.15
  table_spans: 0.08
  reward_anchor: 0.0
  kl_anchor: 0.0
  label_smoothing: 0.01
  sample_weight_floor: 0.25
reward_weights:
  markdown_validity: 1.0
  latex_validity: 1.0
  table_validity: 1.0
  reading_order: 0.5
  edit_similarity: 1.2
  formula_exactness: 0.9
  header_footer_suppression: 0.5
  chart_text: 0.3
  output_length_penalty: 0.1
  latency_penalty: 0.15
  repair_budget_penalty: 0.1
