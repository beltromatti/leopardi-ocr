stage: f0_general_sft
track: s0-core
visual_mode: standard
text_only: false
adapter:
  mode: full
  rank: 0
  alpha: 0
  dropout: 0.0
  target_modules:
    - writer
    - planner
objective:
  target_format: markdown_with_latex
  structure_loss: true
  math_loss: true
  reading_order_loss: true
optimizer:
  name: adamw
  lr: 0.0001
  betas: [0.9, 0.95]
  weight_decay: 0.05
  eps: 1.0e-8
  grad_clip_norm: 1.0
scheduler:
  name: cosine
  warmup_ratio: 0.06
  min_lr_ratio: 0.15
sampling:
  easy_ratio: 0.28
  medium_ratio: 0.34
  hard_ratio: 0.28
  pathological_ratio: 0.10
  failure_replay_ratio: 0.10
  refresh_failure_buffer_every: 500
  keep_clean_anchor_fraction: 0.18
module_lr:
  visual_tokenizer: 0.45
  layout_side_encoder: 0.55
  latent_bottleneck: 0.75
  planner: 1.05
  writer: 1.2
  auxiliary_heads: 1.0
verifier:
  reward_clip: 2.0
  normalize_rewards: true
  min_reward_group_size: 8
  informative_reward_floor: 0.02
  target_latency_ms: 1250.0
  target_output_tokens: 4096
  kl_anchor_beta: 0.0
loss_weights:
  token_ce: 1.0
  mtp_ce: 0.1
  formula_ce: 0.1
  table_ce: 0.1
  repair_ce: 0.0
  block_type: 0.15
  block_length: 0.05
  specialist_hint: 0.08
  block_box: 0.05
  rotation: 0.03
  handwriting: 0.03
  formula_tokens: 0.08
  table_blocks: 0.08
  table_spans: 0.04
  reward_anchor: 0.0
  kl_anchor: 0.0
  label_smoothing: 0.02
  sample_weight_floor: 0.25
reward_weights:
  markdown_validity: 1.0
  latex_validity: 0.8
  table_validity: 0.8
  reading_order: 0.4
  edit_similarity: 1.2
  formula_exactness: 0.8
  header_footer_suppression: 0.4
  chart_text: 0.4
  output_length_penalty: 0.1
  latency_penalty: 0.15
  repair_budget_penalty: 0.1
