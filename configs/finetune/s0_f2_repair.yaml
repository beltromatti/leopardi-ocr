stage: f2_repair_sft
track: s0-repair
visual_mode: hard
text_only: false
data_bundle_ids:
  - sft_repair_v1
  - f2_repair_sft_v1
target_pool_samples: 180000
target_stage_draws: 180000
bundle_sampling_weights:
  sft_repair_v1: 0.40
  f2_repair_sft_v1: 0.60
adapter:
  mode: full
  rank: 0
  alpha: 0
  dropout: 0.0
  target_modules:
    - writer
    - planner
objective:
  local_block_repair: true
  stronger_structured_constraints: true
optimizer:
  name: adamw
  lr: 0.00006
  betas: [0.9, 0.95]
  weight_decay: 0.03
  eps: 1.0e-8
  grad_clip_norm: 1.0
scheduler:
  name: cosine
  warmup_ratio: 0.03
  min_lr_ratio: 0.2
sampling:
  easy_ratio: 0.08
  medium_ratio: 0.18
  hard_ratio: 0.40
  pathological_ratio: 0.34
  failure_replay_ratio: 0.35
  refresh_failure_buffer_every: 200
  keep_clean_anchor_fraction: 0.08
module_lr:
  vision_encoder: 0.40
  layout_side_encoder: 0.45
  latent_bottleneck: 0.75
  planner: 1.1
  writer: 1.3
  auxiliary_heads: 1.0
verifier:
  reward_clip: 2.3
  normalize_rewards: true
  min_reward_group_size: 6
  informative_reward_floor: 0.01
  target_latency_ms: 1450.0
  target_output_tokens: 3584
  kl_anchor_beta: 0.01
loss_weights:
  token_ce: 0.6
  mtp_ce: 0.05
  formula_ce: 0.12
  table_ce: 0.12
  repair_ce: 1.0
  block_type: 0.1
  block_length: 0.05
  specialist_hint: 0.1
  block_box: 0.03
  rotation: 0.02
  handwriting: 0.02
  formula_tokens: 0.08
  table_blocks: 0.1
  table_spans: 0.05
  reward_anchor: 0.1
  kl_anchor: 0.02
  label_smoothing: 0.01
  sample_weight_floor: 0.25
reward_weights:
  markdown_validity: 1.2
  latex_validity: 1.0
  table_validity: 1.0
  reading_order: 0.5
  edit_similarity: 1.2
  formula_exactness: 1.0
  header_footer_suppression: 0.6
  chart_text: 0.4
  output_length_penalty: 0.08
  latency_penalty: 0.2
  repair_budget_penalty: 0.15
