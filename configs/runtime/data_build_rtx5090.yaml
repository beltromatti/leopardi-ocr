runtime:
  purpose: single_gpu_data_build
  hardware_tag: rtx5090
  cpu_workers: 12
  io_workers: 16
  local_disk_budget_gb: 900
  max_active_sources: 2
  priority:
    - resumability
    - bounded_disk_usage
    - publish_then_purge
  implementation_notes:
    - publish every completed bundle before starting the next large acquisition wave
    - prefer metadata-first selection and shard-first materialization
    - use upload-large-folder style publication for large bundle pushes
    - enable high-performance Xet transfers only when network and CPU headroom are available
  logging:
    console_log: console.log
    structured_events: events.ndjson
    heartbeat: heartbeat.json
    heartbeat_seconds: 30
    low_level_logs_local_only: true
  control:
    stop_file: control/STOP
    reload_file: control/RELOAD
    note_file: control/NOTE.txt
  persistence:
    local_run_root: runs
    bundle_target: hf://leopardi-ocr-data-bundles
    metadata_target: hf://leopardi-ocr-data-metadata
    upload_mode: upload_large_folder
    upload_cache_dir: .cache/huggingface
    sync_policy: bundle_boundary_and_final
