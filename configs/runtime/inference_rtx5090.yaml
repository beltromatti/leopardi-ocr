runtime:
  purpose: single_gpu_inference
  hardware_tag: rtx5090
  primary_runtime: vllm
  alternate_runtime: sglang
  model_dir_env: LEOPARDI_MODEL_DIR
  host: 127.0.0.1
  vllm_port: 30000
  sglang_port: 30001
  gpu_memory_utilization: 0.88
  mem_fraction_static: 0.82
  max_model_len: 8192
  max_num_seqs: 16
  tensor_parallel_size: 1
  enable_prefix_caching: true
  chunked_prefill: true
  log_every: 10
  eval_every: 1
  save_every: 1
  logging:
    console_log: console.log
    structured_events: events.ndjson
    heartbeat: heartbeat.json
    heartbeat_seconds: 30
    low_level_logs_local_only: true
  control:
    stop_file: control/STOP
    reload_file: control/RELOAD
    note_file: control/NOTE.txt
  persistence:
    local_run_root: runs
    report_target: hf://leopardi-ocr-reports
    metadata_target: hf://leopardi-ocr-metadata
    summary_sync_policy: final_and_milestone
