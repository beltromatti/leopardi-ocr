model:
  family: leopardi_s0
  target_params_m: 200
  hidden_size: 576
  architecture_contract:
    parser_scope: document_parser
    processing_unit: page
    output_contract: markdown_with_latex
    backbone_regime: pretrained_dense
    planner_writer_split: true
    dynamic_visual_budget: true
    layout_side_memory: true
    mtp_ready_decode: true
    localized_repair: true

  page_canonicalizer:
    line_density_pool: 16
    contrast_eps: 1.0e-5

  vision_encoder:
    pretrained_model: google/siglip2-base-patch16-naflex
    output_dim: 768
    freeze_layers: 8
    pixel_shuffle_factor: 2
    projection_dim: 576

  layout_side_encoder:
    stem_dim: 64
    hidden_size: 576
    pool_grid: [3, 4]
    dropout: 0.0

  latent_bottleneck:
    hidden_size: 576
    num_latents: 192
    num_layers: 3
    num_heads: 9
    num_kv_heads: 3
    mlp_ratio: 2.6666666667
    dropout: 0.1

  planner:
    hidden_size: 576
    num_layers: 3
    num_heads: 9
    num_kv_heads: 3
    num_blocks: 64
    mlp_ratio: 2.6666666667
    num_length_buckets: 8
    block_types:
      - heading
      - paragraph
      - list
      - table
      - figure
      - figure_caption
      - equation
      - page_header
      - page_footer
      - marginalia
    specialist_hints:
      - default
      - math
      - table
      - handwriting
      - chart
    dropout: 0.1

  writer_decoder:
    vocab_size: 40960
    hidden_size: 576
    num_layers: 12
    num_heads: 9
    num_kv_heads: 3
    mlp_ratio: 2.6666666667
    max_seq_len: 4096
    rope_theta: 1000000.0
    dropout: 0.1
    tie_embeddings: true
    pretrained_init: HuggingFaceTB/SmolLM2-135M
    init_layer_indices: [0, 3, 5, 8, 11, 13, 16, 18, 21, 24, 26, 29]

  multi_token_prediction:
    enabled: true
    horizon: 2
    dropout: 0.05

  auxiliary_heads:
    rotation_classes: 4
    handwriting_classes: 4
    table_span_dims: 4
