model:
  family: leopardi_s1
  target_params_m: 600
  hidden_size: 960
  parent_family: leopardi_s0
  architecture_contract:
    parser_scope: document_parser
    processing_unit: page
    output_contract: markdown_with_latex
    backbone_regime: pretrained_dense
    planner_writer_split: true
    dynamic_visual_budget: true
    layout_side_memory: true
    mtp_ready_decode: true
    localized_repair: true
    recipe_preserving_scaleup: true

  page_canonicalizer:
    line_density_pool: 16
    contrast_eps: 1.0e-5

  vision_encoder:
    pretrained_model: google/siglip2-base-patch16-naflex
    output_dim: 768
    freeze_layers: 0
    pixel_shuffle_factor: 2
    projection_dim: 960

  layout_side_encoder:
    stem_dim: 128
    hidden_size: 960
    pool_grid: [4, 6]
    dropout: 0.0

  latent_bottleneck:
    hidden_size: 960
    num_latents: 384
    num_layers: 6
    num_heads: 15
    num_kv_heads: 5
    mlp_ratio: 2.6666666667
    dropout: 0.1

  planner:
    hidden_size: 960
    num_layers: 5
    num_heads: 15
    num_kv_heads: 5
    num_blocks: 112
    mlp_ratio: 2.6666666667
    num_length_buckets: 8
    block_types:
      - heading
      - paragraph
      - list
      - table
      - figure
      - figure_caption
      - equation
      - page_header
      - page_footer
      - marginalia
    specialist_hints:
      - default
      - math
      - table
      - handwriting
      - chart
    dropout: 0.1

  writer_decoder:
    vocab_size: 40960
    hidden_size: 960
    num_layers: 27
    num_heads: 15
    num_kv_heads: 5
    mlp_ratio: 2.6666666667
    max_seq_len: 4096
    rope_theta: 1000000.0
    dropout: 0.1
    tie_embeddings: true
    pretrained_init: HuggingFaceTB/SmolLM2-360M
    init_layer_indices: [0, 1, 2, 4, 5, 6, 7, 8, 10, 11, 12, 13, 14, 16, 17, 18, 19, 20, 21, 23, 24, 25, 26, 27, 29, 30, 31]

  multi_token_prediction:
    enabled: true
    horizon: 3
    dropout: 0.05

  auxiliary_heads:
    rotation_classes: 4
    handwriting_classes: 4
    table_span_dims: 4
